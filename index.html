<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0B2348" />
  <title>Panel SAGC</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <div class="brand-text">
          <strong>SAGC</strong>
          <span>Panel Empresarial</span>
        </div>
        <button class="icon-btn sidebar-close" id="sidebarClose" aria-label="Cerrar menú">×</button>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <button class="nav-item active" data-view="dashboard">
          <span class="nav-icon">⌂</span><span>Dashboard</span>
        </button>

        <div class="nav-section">Comercio</div>
        <button class="nav-item" data-view="productos"><span class="nav-icon">▦</span><span>Productos</span></button>
        <button class="nav-item" data-view="categorias"><span class="nav-icon">◫</span><span>Categorías</span></button>
        <button class="nav-item" data-view="marcas"><span class="nav-icon">◇</span><span>Marcas</span></button>
        <button class="nav-item" data-view="inventario"><span class="nav-icon">▤</span><span>Inventario</span></button>

        <div class="nav-section">Operaciones</div>
        <button class="nav-item" data-view="ventas"><span class="nav-icon">↗</span><span>Ventas</span></button>
        <button class="nav-item" data-view="compras"><span class="nav-icon">↙</span><span>Compras</span></button>
        <button class="nav-item" data-view="clientes"><span class="nav-icon">◉</span><span>Clientes</span></button>
        <button class="nav-item" data-view="proveedores"><span class="nav-icon">◎</span><span>Proveedores</span></button>
        <button class="nav-item" data-view="caja"><span class="nav-icon">▣</span><span>Caja</span></button>

        <div class="nav-section">Gestión</div>
        <button class="nav-item" data-view="reportes"><span class="nav-icon">▥</span><span>Reportes</span></button>
        <button class="nav-item" data-view="usuarios"><span class="nav-icon">♙</span><span>Usuarios y roles</span></button>
        <button class="nav-item" data-view="auditoria"><span class="nav-icon">✓</span><span>Auditoría</span></button>
        <button class="nav-item" data-view="configuracion"><span class="nav-icon">⚙</span><span>Configuración</span></button>
      </nav>

      <div class="sidebar-footer">
        <div class="system-status">
          <span class="status-dot"></span>
          <div>
            <strong>Sistema disponible</strong>
            <small>Maqueta visual</small>
          </div>
        </div>
      </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn mobile-menu" id="mobileMenu" aria-label="Abrir menú">☰</button>
          <div>
            <div class="breadcrumbs">Panel SAGC / <span id="breadcrumbCurrent">Dashboard</span></div>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="global-search">
            <span>⌕</span>
            <input type="search" placeholder="Buscar en el panel..." />
          </div>
          <button class="icon-btn notification-btn" aria-label="Notificaciones">
            ♢
            <span class="badge">3</span>
          </button>
          <button class="profile-btn">
            <span class="avatar">AD</span>
            <span class="profile-copy"><strong>Administrador</strong><small>Propietario</small></span>
            <span>⌄</span>
          </button>
        </div>
      </header>

      <section class="content" id="appContent"></section>
    </main>
  </div>

  <template id="emptyModuleTemplate">
    <section class="module-page">
      <div class="page-actions">
        <div>
          <p class="eyebrow">Módulo SAGC</p>
          <h2 class="module-heading"></h2>
          <p class="module-description"></p>
        </div>
        <button class="btn btn-primary module-primary-action">+ Nuevo registro</button>
      </div>

      <div class="toolbar">
        <div class="search-field"><span>⌕</span><input type="search" placeholder="Buscar..." /></div>
        <button class="btn btn-secondary">Filtros</button>
        <button class="btn btn-secondary">Exportar</button>
      </div>

      <div class="data-card">
        <div class="table-wrap">
          <table>
            <thead><tr class="module-table-head"></tr></thead>
            <tbody>
              <tr>
                <td class="empty-state-cell" colspan="8">
                  <div class="empty-state">
                    <div class="empty-icon">□</div>
                    <h3>Aún no hay registros</h3>
                    <p>Este módulo está listo para conectarse con Google Sheets, Apps Script y Firebase.</p>
                    <button class="btn btn-primary module-empty-action">Crear primer registro</button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </template>

  <script src="js/app.js"></script>
</body>
</html>
